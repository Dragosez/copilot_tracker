name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build .deb package
        run: |
          # Pass the tag name (e.g., v1.0.3) to the make command
          make deb VERSION=${{ github.ref_name }}

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/main.py
          # Only commit if there are changes to avoid error
          git diff --quiet && git diff --staged --quiet || git commit -m "Bump version to ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: copilot-tracker.deb
          body: |
            ## Copilot Tracker (Native Linux)
            
            Install this .deb package to get the native topbar indicator with wide horizontal text.
            
            ### Installation
            1. Download `copilot-tracker.deb`
            2. Open with Software Install or run `sudo apt install ./copilot-tracker.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
